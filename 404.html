<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Support - Page Not Found | Oakland County Sewer Pros</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        emergency: {
                            50: '#fef2f2',
                            100: '#fee2e2',
                            500: '#ef4444',
                            600: '#dc2626',
                            700: '#b91c1c',
                            950: '#450a0a',
                        },
                        darkbg: {
                            900: '#0b0f19',
                            800: '#111827',
                            700: '#1f2937',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .glow-red {
            box-shadow: 0 0 25px -5px rgba(239, 68, 68, 0.4);
        }
        .pulse-btn {
            animation: pulse-danger 2s infinite;
        }
        @keyframes pulse-danger {
            0% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
            }
            70% {
                box-shadow: 0 0 0 15px rgba(239, 68, 68, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
            }
        }
        body {
            background-color: #0b0f19;
            background-image: radial-gradient(circle at 50% 50%, #1e1520 0%, #0b0f19 100%);
        }
    </style>
</head>
<body class="font-sans text-gray-200 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full text-center bg-darkbg-800/80 backdrop-blur-xl border border-red-500/20 p-8 rounded-2xl shadow-2xl relative overflow-hidden">
        <!-- Accent glow -->
        <div class="absolute -top-10 -left-10 w-40 h-40 bg-red-500/10 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-10 -right-10 w-40 h-40 bg-orange-500/10 rounded-full blur-3xl"></div>

        <!-- Warning Icon -->
        <div class="flex justify-center mb-6">
            <div class="p-4 bg-red-500/10 rounded-full border border-red-500/30 glow-red animate-bounce">
                <svg class="w-12 h-12 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                </svg>
            </div>
        </div>

        <!-- Heading -->
        <h1 class="text-4xl font-outfit font-extrabold text-white mb-3 tracking-tight">PAGE NOT FOUND</h1>
        <p class="text-gray-400 mb-8 leading-relaxed">
            The page you are looking for has been moved, removed, or is temporarily unavailable. 
        </p>

        <!-- Emergency Action Call -->
        <div class="bg-red-950/40 border border-red-500/30 rounded-xl p-5 mb-8 text-left">
            <h3 class="text-red-400 font-bold text-sm uppercase tracking-wider mb-1">Need Immediate Assistance?</h3>
            <p class="text-xs text-gray-400 mb-3">If you are currently experiencing a sewer backup or sewage emergency, do not wait.</p>
            <a href="tel:2485550199" class="flex items-center justify-center gap-3 w-full py-3 bg-red-600 hover:bg-red-700 active:bg-red-800 text-white font-bold rounded-lg transition-all duration-300 transform hover:scale-[1.02] pulse-btn">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.94.725l.548 2.2a1 1 0 01-.321.988l-1.305.98a10.582 10.582 0 004.872 4.872l.98-1.305a1 1 0 01.988-.321l2.2.548a1 1 0 01.725.94V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path>
                </svg>
                <span>Call 24/7 Dispatch: (248) 555-0199</span>
            </a>
        </div>

        <!-- Navigation Buttons -->
        <div class="flex flex-col gap-2">
            <a href="/" class="px-5 py-2.5 bg-darkbg-700 hover:bg-gray-700 text-white font-semibold rounded-lg border border-gray-600 transition-all duration-300">
                Return to Homepage
            </a>
        </div>
    </div>
</body>
</html>
